<html>
    <body>
        <h1>Theater Scheduler</h1>
        <form action="/getdata/home/" method="post">
            {% csrf_token %}
            <h2>Add Cast Member</h2>
            {{ form }}
            <input type="submit" value="Submit">
        </form>

        <h1>Cast</h1>
        <ul>
            {% for performer in all_performers %}
            <li><a href="/getdata/info/{{ performer.id }}/">{{ performer.name }}</a></li>
            {% endfor %}
        </ul>
    </body>
</html>
