<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Theater Scheduler</title>
        {% load static %}
        <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.6/css/bootstrap.min.css">
        <link rel="stylesheet" type="text/css" href="{% static 'style.css' %}">
    </head>
    <body>
    <nav class="navbar navbar-default">
        <div class="container-fluid">
            <div class="navbar-header">
            <button type="button" class="navbar-toggle" data-toggle="collapse" data-target="#topnavbar">
                <span class="icon-bar"></span>
                <span class="icon-bar"></span>
                <span class="icon-bar"></span>
            </button>
            <a class="navbar-brand" href="{% url 'getdata:home' %}">Home</a>&nbsp;
            </div>
            <div class="collapse navbar-collapse">
                <ul class="nav navbar-nav">
                    <li class="">
                        <a href="{% url 'getdata:call-add' %}" aria-hidden="true">Create a Schedule</a>&nbsp;
                    </li>
                    <li class="">
                        <a href="{% url 'getdata:performer-add' %}" aria-hidden="true">Add Cast Member</a>&nbsp;
                    </li>
                    <li class="">
                        <a href="{% url 'getdata:show-add' %}" aria-hidden="true">Add Show</a>&nbsp;
                    </li>
                </ul>
                <form class="navbar-form navbar-left" role="search" method="get" action="">
                    <div class="form-group">
                        <input type="text" class="form-control" name="q" value="">&nbsp;
                    </div>&nbsp;
                    <button type="submit" class="btn btn-default">Search</button>&nbsp;
                </form>
                <ul class="nav navbar-right">
                    <li class="">
                        <a href="">
                            <span class="glyphicon glyphicon-off" aria-hidden="true"></span>&nbsp; Logout
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div style="margin-left: 2%;">
    {% block body %}
    {% endblock %}
    </div>
    </body>
</html>
