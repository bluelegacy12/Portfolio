{% extends 'base.html' %}
{% block body %}
{% if error_message %}
    <h1>{{ error_message }}</h1>
{% endif %}
<h1>ID: {{ object.id }}</h1>
<h2>
<u>Name:</u> {{ object.name }} <br><br>
<u>Show:</u> {{ object.show_id.title }} <br><br>
<u>Performer:</u> {{ object.performer_id.name }}
</h2>
{% endblock %}
